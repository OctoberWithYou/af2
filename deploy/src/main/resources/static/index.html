<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Forward 部署管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
</head>
<body style="margin:0;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;">
<div id="app" style="max-width:1400px;margin:0 auto;padding:20px;">
    <div style="background:white;border-radius:10px;padding:20px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
        <h1 style="margin:0;">AI Forward 部署管理平台</h1>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px;">
        <div style="background:white;border-radius:10px;padding:20px;text-align:center;"><div style="font-size:36px;font-weight:bold;color:#667eea;">{{stats.totalAgents}}</div><div>Agent 总数</div></div>
        <div style="background:white;border-radius:10px;padding:20px;text-align:center;"><div style="font-size:36px;font-weight:bold;color:#67c23a;">{{stats.runningAgents}}</div><div>运行中 Agent</div></div>
        <div style="background:white;border-radius:10px;padding:20px;text-align:center;"><div style="font-size:36px;font-weight:bold;color:#667eea;">{{stats.totalServers}}</div><div>Server 总数</div></div>
        <div style="background:white;border-radius:10px;padding:20px;text-align:center;"><div style="font-size:36px;font-weight:bold;color:#67c23a;">{{stats.runningServers}}</div><div>运行中 Server</div></div>
    </div>
    <div style="background:white;border-radius:10px;padding:30px;">
        <el-table :data="configs" border stripe>
            <el-table-column prop="id" label="ID" width="80"/>
            <el-table-column prop="name" label="名称"/>
            <el-table-column prop="type" label="类型" width="100"/>
            <el-table-column prop="status" label="状态" width="100"/>
            <el-table-column prop="configJson" label="配置" show-overflow-tooltip/>
            <el-table-column label="操作" width="200" fixed="right">
                <template #default="scope">
                    <el-button type="success" size="small" @click="deploy(scope.row.id)">部署</el-button>
                    <el-button type="warning" size="small" @click="stop(scope.row.id)">停止</el-button>
                    <el-button type="danger" size="small" @click="remove(scope.row.id)">删除</el-button>
                </template>
            </el-table-column>
        </el-table>
    </div>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
const {createApp,ref,onMounted}=Vue;
createApp({
setup(){
const API_BASE='/api/deploy';
const configs=ref([]);
const stats=ref({totalAgents:0,runningAgents:0,totalServers:0,runningServers:0});
const loadStats=async()=>{
try{
const r=await axios.get(API_BASE+'/stats');
if(r.data.success)stats.value=r.data;
}catch(e){console.error(e);}
};
const loadConfigs=async()=>{
try{
const r=await axios.get(API_BASE+'/configs');
if(r.data.success)configs.value=r.data.data||[];
}catch(e){console.error(e);}
};
const deploy=async(id)=>{
try{await axios.post(API_BASE+'/configs/'+id+'/deploy');alert('部署成功');loadConfigs();loadStats();}catch(e){alert('部署失败');}
};
const stop=async(id)=>{
try{await axios.post(API_BASE+'/configs/'+id+'/stop');alert('停止成功');loadConfigs();loadStats();}catch(e){alert('停止失败');}
};
const remove=async(id)=>{
if(confirm('确定删除？')){await axios.delete(API_BASE+'/configs/'+id);alert('删除成功');loadConfigs();loadStats();}
};
onMounted(()=>{loadConfigs();loadStats();});
return{configs,stats,deploy,stop,remove};
}}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
